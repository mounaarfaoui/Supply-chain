<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublie - {{ actor|title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Bree+Serif&display=swap" rel="stylesheet">
    <style>
        :root {
            --oak: #4b2d18;
            --foam: #fff9eb;
            --hops: #4e7f3a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Barlow", sans-serif;
            background:
                radial-gradient(circle at 15% 15%, rgba(255, 247, 217, 0.35) 0 140px, transparent 142px),
                linear-gradient(140deg, #4e7f3a 0%, #8da23a 42%, #be7f28 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .reset-box {
            width: min(460px, 100%);
            background: linear-gradient(180deg, #fff9ee 0%, #f6e9ca 100%);
            padding: 30px;
            border-radius: 18px;
            border: 1px solid rgba(75, 45, 24, 0.2);
            box-shadow: 0 24px 40px rgba(23, 18, 11, 0.28);
        }

        h2 {
            margin: 0 0 10px;
            font-family: "Bree Serif", serif;
            color: var(--oak);
            font-size: 1.8rem;
        }
        p {
            margin: 0 0 16px;
            color: #5f3d24;
            font-weight: 600;
        }

        input[type="email"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0 0;
            border-radius: 10px;
            border: 1px solid #d7be8b;
            background: #fffef9;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #5d8737 0%, #3f682b 100%);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        button:hover { transform: translateY(-2px); }

        .links {
            margin-top: 16px;
            font-size: 0.95rem;
            text-align: center;
        }

        .links a {
            color: var(--hops);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="reset-box">
        <h2>Mot de passe oublie</h2>
        <p>Role: {{ actor|title }}</p>
        <form method="POST">
            {% csrf_token %}
            <input type="email" name="email" placeholder="Votre email" required>
            <button type="submit">Réinitialiser le mot de passe</button>
        </form>
        <div class="links">
            <a href="/login/{{ actor }}/">Retour à la connexion</a>
        </div>
    </div>
</body>
</html>
