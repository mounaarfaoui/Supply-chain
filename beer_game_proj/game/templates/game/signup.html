<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inscription - {{ actor }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Bree+Serif&display=swap" rel="stylesheet">
<style>
    :root {
        --malt: #cc8121;
        --oak: #4b2c17;
        --foam: #fff8e9;
        --hops: #4d7f39;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        min-height: 100vh;
        font-family: "Barlow", sans-serif;
        background:
            radial-gradient(circle at 88% 20%, rgba(255, 247, 217, 0.35) 0 130px, transparent 132px),
            linear-gradient(145deg, #4b6f2f 0%, #879a35 42%, #bf7a24 100%);
        display: grid;
        place-items: center;
        padding: 24px;
    }

    .container {
        width: min(460px, 100%);
        background: linear-gradient(180deg, #fff9ee 0%, #f6e8c9 100%);
        border: 1px solid rgba(75, 44, 23, 0.2);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 24px 40px rgba(24, 19, 11, 0.28);
    }

    h2 {
        margin: 0 0 10px;
        font-family: "Bree Serif", serif;
        color: var(--oak);
        font-size: 1.9rem;
    }
    .subtitle {
        margin: 0 0 16px;
        color: #5f3d24;
        font-weight: 600;
    }

    label {
        display: block;
        margin-bottom: 6px;
        color: #4c311d;
        font-weight: 700;
    }

    input {
        width: 100%;
        border: 1px solid #d7be8b;
        background: #fffef9;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 14px;
        font-size: 1rem;
    }

    button {
        width: 100%;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #5d8737 0%, #3f682b 100%);
        color: white;
        padding: 12px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: transform 0.2s ease;
    }

    button:hover { transform: translateY(-2px); }

    .error {
        margin: 0 0 12px;
        padding: 10px;
        border-radius: 9px;
        background: #ffe3e3;
        color: #b42318;
        font-weight: 700;
        text-align: center;
    }

    .links {
        text-align: center;
        margin-top: 14px;
    }

    .links a {
        color: var(--hops);
        font-weight: 700;
        text-decoration: none;
    }
</style>

</head>

<body>

<div class="container">
    <h2>Inscription</h2>
    <p class="subtitle">Role selectionne: {{ actor }}</p>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <label for="email">Email</label>
        <input id="email" type="email" name="email" placeholder="joueur@email.com" required>
        <label for="password">Mot de passe</label>
        <input id="password" type="password" name="password" placeholder="Choisissez un mot de passe" required>
        <button type="submit">Creer le compte</button>
    </form>

    <div class="links"><a href="{% url 'auth_portal' %}">Retour au portail</a></div>

</div>

</body>
</html>
