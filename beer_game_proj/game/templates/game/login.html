<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion - {{ actor }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Bree+Serif&display=swap" rel="stylesheet">
    <style>
        :root {
            --malt: #c67a1c;
            --oak: #4a2b17;
            --foam: #fff8e8;
            --hops: #4d7f39;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Barlow", sans-serif;
            background:
                radial-gradient(circle at 10% 15%, rgba(255, 245, 213, 0.40) 0 140px, transparent 142px),
                linear-gradient(140deg, #5f3a1f 0%, #a56423 52%, #d7952e 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .card {
            width: min(460px, 100%);
            background: linear-gradient(180deg, #fff9ee 0%, #f6e9ca 100%);
            border-radius: 18px;
            border: 1px solid rgba(74, 43, 23, 0.2);
            box-shadow: 0 24px 40px rgba(35, 20, 11, 0.28);
            padding: 28px;
        }
        h2 {
            margin: 0 0 10px;
            font-family: "Bree Serif", serif;
            color: var(--oak);
            font-size: 1.9rem;
        }
        .subtitle {
            margin: 0 0 16px;
            color: #5f3d24;
            font-weight: 600;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #4c311d;
            font-weight: 700;
        }
        input {
            width: 100%;
            border: 1px solid #d7be8b;
            background: #fffef9;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 14px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #7f4a1c 0%, #603514 100%);
            color: #fff;
            padding: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        button:hover { transform: translateY(-2px); }
        .error {
            margin: 0 0 12px;
            padding: 10px;
            border-radius: 9px;
            background: #ffe3e3;
            color: #b42318;
            font-weight: 700;
        }
        .links {
            margin-top: 14px;
            text-align: center;
        }
        .links a {
            color: var(--hops);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Connexion</h2>
    <p class="subtitle">Role selectionne: {{ actor }}</p>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <label for="email">Email</label>
        <input id="email" type="email" name="email" placeholder="joueur@email.com" required>

        <label for="password">Mot de passe</label>
        <input id="password" type="password" name="password" placeholder="Votre mot de passe" required>

        <button type="submit">Se connecter</button>
    </form>

    <div class="links">
        <a href="{% url 'auth_portal' %}">Retour au portail</a>
    </div>
</div>

</body>
</html>
